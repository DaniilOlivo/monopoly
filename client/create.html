<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/create.css">
    <title>Monopoly. Create game</title>
</head>
<body>
    <form class="window form-create" method="post">
        <div class="form-create__input">
            <label for="login">Username:</label>
            <input type="text" name="login" id="login">
        </div>

        <p class="form-create__desc special-text">
            Your Username will be displayed in the game,
             and will also become the name of your room,
             which will be able to join
        </p>

        <div class="panel-control">
            <a class="btn" href="/">Back Menu</a>
            <button type="submit" class="btn panel-control__sumbit">Create</button>
        </div>
    </form>
</body>
</html>
